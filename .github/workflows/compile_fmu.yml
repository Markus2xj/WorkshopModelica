name: compile-fmu

on:
  push:
    paths:
      - 'Workshop_Modelica.mo'
      - 'ITA_Napoli-Capodichino.162890_IGDG.mos'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenModelica
        run: |
          curl -fsSL http://build.openmodelica.org/apt/openmodelica.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/openmodelica-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/openmodelica-keyring.gpg] \
            https://build.openmodelica.org/apt jammy stable" \
            | sudo tee /etc/apt/sources.list.d/openmodelica.list
          sudo apt-get update
          sudo apt-get install -y openmodelica

      - name: Install Modelica Buildings Library 11.0.0
        run: |
          mkdir -p ~/.openmodelica/libraries
          curl -fsSL https://github.com/lbl-srg/modelica-buildings/releases/download/v11.0.0/Buildings-v11.0.0.zip \
            -o /tmp/Buildings.zip
          unzip -q /tmp/Buildings.zip -d ~/.openmodelica/libraries/

      - name: Export linux64 FMU
        run: |
          rm -f Standalone_House.fmu
          echo "=== Libraries directory ==="
          ls ~/.openmodelica/libraries/ || true

          cat > export.mos << EOF
          cd("$GITHUB_WORKSPACE");

          r := loadModel(Buildings);
          print("loadModel(Buildings): " + String(r) + "\n");
          print("Errors: " + getErrorString() + "\n");

          r := loadFile("$GITHUB_WORKSPACE/Workshop_Modelica.mo");
          print("loadFile: " + String(r) + "\n");
          print("Errors: " + getErrorString() + "\n");

          fmuPath := buildModelFMU(
            Workshop_Modelica.Wrapper.Standalone_House,
            version="2.0",
            fmuType="cs",
            platforms={"dynamic"}
          );
          print("FMU written to: " + fmuPath + "\n");
          print("Errors: " + getErrorString() + "\n");
          EOF
          omc export.mos 2>&1

      - name: Verify FMU
        run: ls -lh Standalone_House.fmu

      - name: Commit FMU
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Standalone_House.fmu
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "ci: build linux64 FMU with OpenModelica on Ubuntu [skip ci]"
            git push
          )
