name: compile-fmu

on:
  push:
    paths: ['Standalone_House.fmu']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools and fmpy
        run: |
          sudo apt-get install -y cmake build-essential
          pip install fmpy

      - name: Patch FMU
        run: |
          # Fetch ModelicaExternalC headers and implementations
          BASE="https://raw.githubusercontent.com/modelica/ModelicaExternalC/master/C-Sources"
          for f in ModelicaStrings.h ModelicaStrings.c \
                   ModelicaUtilities.h \
                   ModelicaError.h ModelicaFormatMessage.h; do
            curl -fsSL "$BASE/$f" -o "$f"
          done

          python - <<'PY'
          import zipfile, glob, shutil

          src = 'Standalone_House.fmu'
          tmp = 'Standalone_House_patched.fmu'

          with zipfile.ZipFile(src, 'r') as zin, \
               zipfile.ZipFile(tmp, 'w', zipfile.ZIP_DEFLATED) as zout:
              existing = set(zin.namelist())
              for name in zin.namelist():
                  if name == 'sources/CMakeLists.txt':
                      # Remove OM's Windows-path cmake so fmpy generates its own
                      print(f'Removed {name}')
                      continue
                  zout.writestr(name, zin.read(name))
              for f in glob.glob('*.h') + glob.glob('*.c'):
                  key = f'sources/{f}'
                  if key not in existing:
                      zout.write(f, key)
                      print(f'Added {key}')

          shutil.move(tmp, src)
          PY

      - name: Compile linux64 binary
        run: python -m fmpy compile Standalone_House.fmu

      - name: Commit updated FMU
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Standalone_House.fmu
          git diff --staged --quiet && echo "Nothing to commit." || (
            git commit -m "ci: add linux64 binary to FMU [skip ci]"
            git push
          )
